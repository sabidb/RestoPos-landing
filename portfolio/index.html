<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DB Labs — Full-stack Developer</title>
<meta name="description" content="DB Labs builds products for restaurants, communities and startups — POS systems, automation agents, games and websites, end to end.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23C1663D'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='14' font-weight='800' text-anchor='middle' fill='%23F8F4EF'%3E&lt;/&gt;%3C/text%3E%3C/svg%3E">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #F8F4EF; color: #17233A; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  * { box-sizing: border-box; }
  ::selection { background: #C1663D; color: #F8F4EF; }
  a { color: inherit; }
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 2px solid #C1663D; outline-offset: 3px; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .terminal-cursor { animation: blink 1s step-end infinite; }
  @keyframes loaderGridDrift { 0% { background-position: 0 0, 0 0; } 100% { background-position: 46px 46px, 46px 46px; } }
  @keyframes loaderFadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

  /* ---- layout helpers (media queries; the rest is inline / Framer Motion) ---- */
  .wrap { max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 48px; }
  .hero-grid { display: grid; grid-template-columns: minmax(0,1.05fr) minmax(0,0.95fr); gap: 56px; align-items: center; }
  .about-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 64px; align-items: center; }
  .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .nav-links { display: flex; gap: 6px; align-items: center; }
  .footer-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 18px; }

  @media (max-width: 900px) {
    .wrap { padding: 0 26px; }
    .hero-grid { grid-template-columns: 1fr; gap: 40px; }
    .hero-card-col { display: none; }
    .about-grid { grid-template-columns: 1fr; gap: 36px; }
    .work-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .nav-links { display: none; }
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .work-grid { grid-template-columns: 1fr; }
    .wrap { padding: 0 20px; }
  }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
</style>
</head>
<body>

<!-- LOADER — minimal techy boot (vanilla, runs before the React app mounts) -->
<div id="loader" style="position: fixed; inset: 0; z-index: 200; background: #0A1220; display: flex; align-items: center; justify-content: center; overflow: hidden; font-family: 'JetBrains Mono', monospace;">
  <div style="position: absolute; inset: -1px; background-image: linear-gradient(rgba(248,244,239,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(248,244,239,0.035) 1px, transparent 1px); background-size: 46px 46px; animation: loaderGridDrift 9s linear infinite; pointer-events: none;"></div>
  <div style="position: absolute; width: 60vw; height: 60vw; max-width: 640px; max-height: 640px; border-radius: 50%; background: radial-gradient(circle, rgba(193,102,61,0.16) 0%, transparent 62%); filter: blur(18px); pointer-events: none;"></div>
  <div style="position: absolute; top: 22px; left: 24px; font-size: 11px; letter-spacing: 0.16em; color: rgba(248,244,239,0.30);">~/db.dev &middot; portfolio</div>
  <div style="position: relative; z-index: 2; text-align: center; width: min(380px, 84vw);">
    <div style="font-size: clamp(46px,12vw,88px); font-weight: 800; color: #F8F4EF; letter-spacing: 1px; line-height: 1; white-space: nowrap;">
      <span id="loaderWord"></span><span id="loaderCaret" style="color: #C1663D; font-weight: 400;" class="terminal-cursor">&#9615;</span>
    </div>
    <div style="margin-top: 34px; height: 2px; width: 100%; background: rgba(248,244,239,0.10); border-radius: 2px; overflow: hidden;">
      <div id="loaderBar" style="height: 100%; width: 0%; background: linear-gradient(90deg, #C1663D, #E2A184); box-shadow: 0 0 12px rgba(193,102,61,0.55); transition: width 0.14s linear;"></div>
    </div>
    <div style="margin-top: 14px; display: flex; justify-content: space-between; font-size: 12px; letter-spacing: 0.12em; color: rgba(248,244,239,0.42);">
      <span id="loaderText">initializing</span>
      <span><span id="loaderPercent">0</span>%</span>
    </div>
  </div>
  <div style="position: absolute; bottom: 26px; left: 24px; z-index: 3; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(248,244,239,0.34);">Created by <span style="color: #C1663D; font-weight: 700;">DB Labs</span></div>
  <button id="skipLoader" style="position: absolute; bottom: 26px; right: 24px; z-index: 3; background: transparent; border: 1px solid rgba(248,244,239,0.16); color: rgba(248,244,239,0.5); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; padding: 7px 14px; border-radius: 6px; cursor: pointer;">skip &rarr;</button>
</div>

<div id="root"></div>

<script src="./vendor/react.min.js"></script>
<script src="./vendor/react-dom.min.js"></script>
<script src="./vendor/framer-motion.js"></script>
<script src="./vendor/htm.umd.js"></script>
<script src="./app.js"></script>
</body>
</html>
